<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHARP HUMAN | CORE</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
</head>
<body class="system-bg">

    <div class="scanlines"></div>

    <main class="core-interface">
        <div class="logo-wrapper">
            <img src="logo1-3.png" alt="SHARP HUMAN" class="head-logo">
            <div class="logo-aura"></div>
        </div>

        <div class="terminal-container">
            <span class="prefix">SYSTEM_LOG_//</span>
            <span id="typewriter"></span><span class="blink">_</span>
        </div>

        <nav class="system-nav">
            <a href="mailto:hello@sharphuman.com">DIRECT_COMMS</a>
            <span class="divider">|</span>
            <a href="https://recruit.sharphuman.com">RECRUIT_MODULE</a>
        </nav>
    </main>

    <script>
        const textElement = document.getElementById('typewriter');
        const phrases = [
            "ACTIVE DIRECTORY ARCHITECTURE LOADED...",
            "HYBRID-CLOUD INFRASTRUCTURE SECURED...",
            "ZERO TRUST PROTOCOLS ACTIVE...",
            "AI AGENT ORCHESTRATION IN PROGRESS...",
            "SHARP HUMAN CORE: STATUS OPTIMAL"
        ];
        
        let phraseIndex = 0;
        let charIndex = 0;
        let isDeleting = false;

        function type() {
            const currentPhrase = phrases[phraseIndex];
            
            if (isDeleting) {
                textElement.textContent = currentPhrase.substring(0, charIndex - 1);
                charIndex--;
            } else {
                textElement.textContent = currentPhrase.substring(0, charIndex + 1);
                charIndex++;
            }

            let typeSpeed = isDeleting ? 30 : 70;

            if (!isDeleting && charIndex === currentPhrase.length) {
                isDeleting = true;
                typeSpeed = 3000; 
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                phraseIndex = (phraseIndex + 1) % phrases.length;
                typeSpeed = 500;
            }

            setTimeout(type, typeSpeed);
        }

        document.addEventListener('DOMContentLoaded', type);
    </script>
</body>
</html>
